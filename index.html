<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Manzoor Ali - Software Engineer & Frontend Developer. Specializing in building responsive and secure web applications." />
  <meta name="keywords"
    content="Manzoor Ali, Software Engineer, Frontend Developer, React, JavaScript, Tailwind CSS, HTML, CSS" />
  <meta name="author" content="Manzoor Ali" />
  <meta name="theme-color" content="#00ff88" />

  <!-- Open Graph -->
  <meta property="og:title" content="Manzoor Ali | Software Engineer" />
  <meta property="og:description"
    content="Software Engineer & Frontend Developer building modern, responsive, and secure web apps." />
  <meta property="og:type" content="website" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet">
  </noscript>

  <title>Manzoor Ali | Frontend Developer</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
        overflow-y: auto; /* allow vertical scrolling */

      font-family: 'Inter', sans-serif;
    }

    .skeleton-intro {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 0;
      text-align: center;
    }

    .skeleton-name {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 900;
      background: linear-gradient(90deg, #00ff88, #00d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fade-in 1s ease-out forwards 0.2s;
    }

    .skeleton-role {
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 600;
      color: #00ff88;
      margin-top: 1rem;
      opacity: 0;
      animation: fade-in 1s ease-out forwards 0.8s;
    }

    @keyframes fade-in {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="skeleton-intro" aria-hidden="true">
      <h1 class="skeleton-name">MANZOOR ALI</h1>
      <p class="skeleton-role">Software Engineer — Frontend Developer</p>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
