<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/src/Assets/icons/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Meta -->
  <meta name="description"
    content="Manzoor Ali – Frontend Developer specializing in modern web development, responsive design, and building fast, user-friendly interfaces using HTML, CSS, and JavaScript." />
  <meta name="keywords"
    content="Manzoor Ali, Frontend Developer, Web Developer, HTML, CSS, JavaScript, Responsive Design, UI Developer, React, Web Development" />
  <meta name="author" content="Manzoor Ali" />

  <!-- Open Graph (Social Sharing) -->
  <meta property="og:title" content="Manzoor Ali - Frontend Developer" />
  <meta property="og:description"
    content="Frontend Developer creating responsive, modern, and user-friendly web interfaces." />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Manzoor Ali - Frontend Developer" />
  <meta name="twitter:description"
    content="Frontend Developer specializing in responsive design and modern web technologies." />

  <!-- Fonts - Optimized for Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Preload critical font weights for faster FCP -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

  <!-- Non-blocking font loading -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet">
  </noscript>

  <title>Manzoor Ali | Frontend Developer</title>
</head>

<body>
  <div id="root">
    <!-- Skeleton Intro (Instant LCP) -->
    <style>
      body {
        margin: 0;
        background: #000;
        color: #fff;
        overflow: hidden;
      }

      .skeleton-intro {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 0;
        font-family: 'Inter', sans-serif;
      }

      .skeleton-name {
        font-size: clamp(3rem, 10vw, 9rem);
        font-weight: 900;
        background: linear-gradient(90deg, #fff, #00ffcc);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-align: center;
        opacity: 0;
        animation: fade-in 0.5s ease-out forwards 0.2s;
      }

      @keyframes fade-in {
        to {
          opacity: 0.3;
        }
      }
    </style>

    <div class="skeleton-intro" aria-hidden="true">
      <h1 class="skeleton-name">Manzoor Ali</h1>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
